version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker_backtest:
    build:
      context: ..
      dockerfile: services/worker_backtest/Dockerfile
    env_file: ../.env
    depends_on:
      - api

  worker_live:
    build:
      context: ..
      dockerfile: services/worker_live/Dockerfile
    env_file: ../.env
    depends_on:
      - api
    deploy:
      replicas: 0

  ingestor:
    build:
      context: ..
      dockerfile: services/ingestor/Dockerfile
    env_file: ../.env
    depends_on:
      - postgres
    deploy:
      replicas: 0

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file: ../.env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  minio:
